{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 slide-up">
            <div class="card shadow">
                <div class="card-header">
                    <h3 class="mb-0"><i class="fas fa-user-circle"></i> My Profile</h3>
                </div>
                <div class="card-body text-center">
                    <img src="{{ user.get_profile_image_url() }}" class="profile-img-large">
                    <h3>{{ user.username }}</h3>
                    <p class="text-muted">{{ user.email }}</p>
                    
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3 text-start">
                            <label class="form-label"><i class="fas fa-comment"></i> Bio</label>
                            <textarea name="bio" class="form-control" rows="4">{{ user.bio }}</textarea>
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label"><i class="fas fa-image"></i> Update Profile Picture</label>
                            <input type="file" name="profile_image" class="form-control" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-mzb-primary">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </form>
                </div>
                <div class="card-footer text-muted text-center">
                    <small>Member since {{ user.created_at.strftime('%B %d, %Y') }}</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
