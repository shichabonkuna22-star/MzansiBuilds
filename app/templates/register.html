{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 slide-up">
            <div class="card shadow">
                <div class="card-header text-center">
                    <h3 class="mb-0"><i class="fas fa-user-plus"></i> Create Account</h3>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-user"></i> Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-check"></i> Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-image"></i> Profile Picture (optional)</label>
                            <input type="file" name="profile_image" class="form-control" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-comment"></i> Bio</label>
                            <textarea name="bio" class="form-control" rows="3" placeholder="Tell us about yourself..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-mzb-primary w-100">
                            <i class="fas fa-rocket"></i> Join MzansiBuilds
                        </button>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small>Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
