{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4 slide-up">
            <div class="card shadow">
                <div class="card-header text-center">
                    <h3 class="mb-0"><i class="fas fa-sign-in-alt"></i> Welcome Back</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" name="remember" class="form-check-input">
                            <label class="form-check-label">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-mzb-primary w-100">
                            <i class="fas fa-arrow-right"></i> Login
                        </button>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small>No account? <a href="{{ url_for('auth.register') }}">Sign up</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
