{% extends "base.html" %}
{% block title %}Create Project{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7 slide-up">
            <div class="card shadow">
                <div class="card-header">
                    <h3 class="mb-0"><i class="fas fa-code-branch"></i> Start a New Project</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-heading"></i> Project Title *</label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g., Mzansi E-commerce Platform">
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="fas fa-align-left"></i> Description *</label>
                            <textarea name="description" class="form-control" rows="5" required placeholder="What are you building? What problem does it solve?"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><i class="fas fa-chart-line"></i> Current Stage</label>
                                <select name="stage" class="form-select">
                                    <option value="ideation">🌱 Ideation</option>
                                    <option value="mvp">⚙️ MVP</option>
                                    <option value="growth">🚀 Growth</option>
                                    <option value="live">🏁 Live</option>
                                    <option value="completed">✅ Completed</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><i class="fas fa-hand-peace"></i> Support Needed (optional)</label>
                                <select name="support_needed" class="form-select">
                                    <option value="">No support needed</option>
                                    <option value="code_review">👥 Code Review</option>
                                    <option value="ui_help">🎨 UI/UX Help</option>
                                    <option value="debugging">🐛 Debugging</option>
                                    <option value="scaling">📈 Scaling Advice</option>
                                    <option value="collaboration">🤝 Collaboration</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-mzb-primary w-100">
                            <i class="fas fa-rocket"></i> Launch Project
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
